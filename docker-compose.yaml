services:
  app:
    image: node:22-alpine
    ports:
      - 3000:3000
    build:
      context: '.'
      dockerfile: Dockerfile
  mongo:
    image: mongo:7.0
    environment:
      MONGODB_INITDB_ROOT_USERNAME: admin
      MONGODB_INITDB_ROOT_PASSWORD: password
      MONGODB_INITDB_DATABASE: arthos

